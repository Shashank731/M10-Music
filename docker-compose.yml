services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      APP_CONFIG: /app/configs/config.yaml
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./mlruns:/app/mlruns

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
