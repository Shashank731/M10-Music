data:
  dataset_dir: data/raw/datasets/undefinenull/million-song-dataset-spotify-lastfm/versions/1

artifacts:
  content_dir: artifacts/content
  collaborative_dir: artifacts/collaborative

model:
  content:
    text_model_name: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    text_weight: 0.2
    audio_weight: 0.8
    top_k: 10
  collaborative:
    factors: 64
    regularization: 0.01
    iterations: 20
    alpha: 40.0
    top_k: 10
  hybrid:
    content_weight: 0.5

mlflow:
  tracking_uri: mlruns
  experiment_name: music-recommendation

backend:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - http://localhost:5173
    - http://localhost:5174
    - http://localhost:3000
    - http://10.230.77.197:5173
