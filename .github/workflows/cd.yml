name: CD

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t music-recommendation-backend:${{ github.ref_name }} .

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t music-recommendation-frontend:${{ github.ref_name }} .

      - name: Deployment plan
        run: |
          echo "Images built successfully."
          echo "Add registry login and deployment target steps for your environment."
